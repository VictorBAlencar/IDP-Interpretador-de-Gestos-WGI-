<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 220px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
        }
        h3 {
            margin-top: 0;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        button {
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #000000;
            border-radius: 4px;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        button:hover {
            background-color: #000000;
            color: #ffffff;
        }
        #status { margin-top: 15px; font-size: 12px; color: #666666; }
    </style>
</head>
<body>
    <h3>WGC Mouse</h3>
    <button id="btn-start">Iniciar Câmera</button>
    <button id="btn-stop">Parar Câmera</button>
    <div id="status">Pronto para iniciar.</div>
    <script src="popup.js"></script>
</body>
</html>
