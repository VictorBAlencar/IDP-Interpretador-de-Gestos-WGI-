name: Build WGC Executables

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite que você dispare o build manualmente no GitHub

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executable
      # --onedir: cria uma pasta (mais rápido que arquivo único). 
      # --collect-data mediapipe: garante que a IA da mão vá junto.
      run: pyinstaller --noconfirm --onedir --console --collect-data mediapipe wgc.py

    - name: Build Windows Installer (Inno Setup)
      if: matrix.os == 'windows-latest'
      run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'

    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WGC-Backend-${{ matrix.os }}
        path: |
          Output/WGC_Backend_Installer.exe
          dist/wgc*

    - name: Upload Frontend Extension
      if: matrix.os == 'ubuntu-latest' # Faz upload da extensão apenas 1 vez (não precisa repetir nos 3 SOs)
      uses: actions/upload-artifact@v4
      with:
        name: WGC-Extensao
        path: extensao/
